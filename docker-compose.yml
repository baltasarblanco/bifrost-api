
services:
  db:
    image: postgres:15-alpine
    container_name: ronin_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}      # ← toma del .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Opcional pero recomendado: healthcheck para que espere a que DB esté lista
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ronin_fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}      # ← toma del .env
    depends_on:
      db:
        condition: service_healthy        # ← mejor que solo depends_on
    # También podés pasar otras variables como JWT_SECRET, etc.

volumes:
  postgres_data: